<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIRAÉ LUXE - Review Seeder</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #F5F0EB, #E8DED3); padding: 20px; min-height: 100vh; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); }
        h1 { color: #8B7355; text-align: center; margin-bottom: 10px; font-size: 32px; }
        .subtitle { text-align: center; color: #6B5D50; margin-bottom: 30px; }
        .status { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 30px; padding: 15px; background: #FFF3CD; border-radius: 8px; border-left: 4px solid #8B7355; }
        .status.connected { background: #D4EDDA; border-left-color: #4CAF50; }
        .status.error { background: #F8D7DA; border-left-color: #DC3545; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #FFC107; animation: pulse 2s infinite; }
        .dot.connected { background: #4CAF50; }
        .dot.error { background: #DC3545; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
        .buttons { display: flex; gap: 15px; justify-content: center; margin-bottom: 25px; flex-wrap: wrap; }
        button { background: linear-gradient(135deg, #8B7355, #A68B6A); color: white; border: none; padding: 16px 40px; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 15px rgba(139,115,85,0.3); }
        button:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 6px 25px rgba(139,115,85,0.5); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        button.secondary { background: linear-gradient(135deg, #D4C4B0, #E8DED3); color: #2C2C2C; }
        .progress-container { background: #F5F0EB; padding: 25px; border-radius: 10px; margin-bottom: 20px; display: none; }
        .progress-container.active { display: block; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat { background: white; padding: 20px; border-radius: 8px; text-align: center; }
        .stat-num { font-size: 28px; font-weight: bold; margin-bottom: 5px; }
        .stat-num.total { color: #8B7355; }
        .stat-num.success { color: #4CAF50; }
        .stat-num.failed { color: #DC3545; }
        .stat-num.current { color: #2196F3; }
        .stat-label { color: #6B5D50; font-size: 12px; text-transform: uppercase; }
        .bar-container { background: white; height: 25px; border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
        .bar { height: 100%; background: linear-gradient(90deg, #8B7355, #A68B6A); transition: width 0.3s; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 12px; }
        .log { background: #2C2C2C; color: #4CAF50; padding: 20px; border-radius: 10px; font-family: monospace; font-size: 12px; max-height: 350px; overflow-y: auto; line-height: 1.6; }
        .log-entry.success { color: #4CAF50; }
        .log-entry.error { color: #FF5252; }
        .log-entry.info { color: #2196F3; }
        .completion { background: linear-gradient(135deg, #4CAF50, #45a049); color: white; padding: 25px; border-radius: 10px; text-align: center; margin-top: 20px; display: none; }
        .completion.show { display: block; }
        .completion h2 { font-size: 24px; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h1>🌸 MIRAÉ LUXE</h1>
    <p class="subtitle">Review Seeder — Uploads 3–5 reviews per product to Railway</p>

    <div class="status" id="status">
        <div class="dot" id="dot"></div>
        <span id="statusText">Checking backend connection...</span>
    </div>

    <div class="buttons">
        <button onclick="startSeeding()" id="seedBtn">🚀 Seed All Reviews</button>
        <button onclick="testConnection()" class="secondary">🔌 Test Connection</button>
        <button onclick="clearLog()" class="secondary">🗑️ Clear Log</button>
    </div>

    <div class="progress-container" id="progressContainer">
        <div class="stats">
            <div class="stat"><div class="stat-num total" id="totalCount">0</div><div class="stat-label">Total Reviews</div></div>
            <div class="stat"><div class="stat-num current" id="currentCount">0</div><div class="stat-label">Uploading</div></div>
            <div class="stat"><div class="stat-num success" id="successCount">0</div><div class="stat-label">✅ Success</div></div>
            <div class="stat"><div class="stat-num failed" id="failedCount">0</div><div class="stat-label">❌ Failed</div></div>
        </div>
        <div class="bar-container"><div class="bar" id="bar">0%</div></div>
        <div class="log" id="log"></div>
    </div>

    <div class="completion" id="completion">
        <h2>🎉 Reviews Seeded!</h2>
        <p id="completionText"></p>
    </div>
</div>

<script>
const API_BASE_URL = 'https://mirae-luxe-production.up.railway.app/api';
let isRunning = false;

const FAKE_USER_IDS = [
    'seed-user-001', 'seed-user-002', 'seed-user-003',
    'seed-user-004', 'seed-user-005', 'seed-user-006',
    'seed-user-007', 'seed-user-008', 'seed-user-009', 'seed-user-010'
];

const SKINCARE_REVIEWS = [
    { title: "Holy grail product!", comment: "This has completely transformed my skin. I've been using it for 3 months and the results are incredible. My skin is so much more hydrated and glowing.", rating: 5 },
    { title: "Worth every dirham", comment: "I was skeptical at first but this product exceeded all my expectations. My skin feels softer and looks more radiant than ever.", rating: 5 },
    { title: "Absolutely love it", comment: "The texture is so luxurious and it absorbs beautifully. No greasy residue and my skin drinks it up. Will definitely repurchase.", rating: 5 },
    { title: "Best skincare purchase", comment: "I've tried so many products but this one actually delivers on its promises. My skin tone is more even and I get so many compliments.", rating: 5 },
    { title: "Great for sensitive skin", comment: "As someone with very sensitive skin I was nervous to try this but it's so gentle yet effective. No irritation at all!", rating: 5 },
    { title: "Impressive results", comment: "After just two weeks I noticed a visible difference in my skin texture. This is now a permanent part of my routine.", rating: 5 },
    { title: "Luxury in a bottle", comment: "This feels so premium and the results back it up. My skin has never looked better and I feel so confident without makeup.", rating: 5 },
    { title: "Really good product", comment: "I've been using this for about a month and my skin is noticeably improved. The formula is great and the scent is lovely.", rating: 4 },
    { title: "Very happy with this", comment: "This is a solid product that does exactly what it says. My skin is more moisturized and the texture has improved.", rating: 4 },
    { title: "Good quality", comment: "Nice product overall. Takes a little time to see results but once they come you'll be impressed. Good quality formulation.", rating: 4 },
    { title: "Lovely texture", comment: "The formula feels so good on skin. Lightweight but deeply moisturizing. I use it morning and night and love the results.", rating: 5 },
    { title: "My skin loves this", comment: "Finally found something that works for my combination skin. Balances perfectly and keeps my T-zone in check all day.", rating: 5 },
    { title: "Highly recommend", comment: "I bought this on a whim and I'm so glad I did. The results speak for themselves and it smells amazing too.", rating: 5 },
    { title: "Game changer", comment: "This product has changed my morning routine for the better. My skin looks healthier and I need much less makeup now.", rating: 5 },
    { title: "Solid performer", comment: "Does what it promises. My skin is more balanced and the formula is gentle enough for daily use. Happy with my purchase.", rating: 4 },
];

const MAKEUP_REVIEWS = [
    { title: "Stunning formula!", comment: "The pigmentation is incredible and it lasts all day without fading. This is luxury makeup at its finest. I am obsessed!", rating: 5 },
    { title: "Perfect for Dubai heat", comment: "This stays put even in the humidity here. No transfer, no fading, just flawless all day long. Absolutely love it!", rating: 5 },
    { title: "Best makeup I own", comment: "The quality is unmatched. Goes on smoothly, blends beautifully, and the finish is absolutely stunning. Worth every penny.", rating: 5 },
    { title: "Gorgeous product", comment: "The colors are so rich and pigmented. A little goes a long way and it stays looking fresh throughout the day.", rating: 5 },
    { title: "Long lasting and beautiful", comment: "I wore this for a 10 hour day and it still looked as fresh as when I applied it. The formula is exceptional.", rating: 5 },
    { title: "Highly pigmented", comment: "One swipe and you get full coverage. The formula is so smooth and creamy. Blends like a dream. Will repurchase always.", rating: 5 },
    { title: "Luxury feel", comment: "This feels so premium to apply and the results are stunning. Gets so many compliments every time I wear it.", rating: 5 },
    { title: "Really impressed", comment: "Better than expected. The quality is really good and it lasts much longer than other brands I've tried. Happy customer!", rating: 4 },
    { title: "Great everyday product", comment: "Perfect for daily wear. Not too heavy, not too light. Gives a beautiful natural finish that looks polished and put together.", rating: 4 },
    { title: "Love the finish", comment: "The finish is absolutely beautiful. Looks professional and lasts all day. This brand really understands quality makeup.", rating: 5 },
    { title: "Amazing coverage", comment: "Covers everything I need it to while still looking natural. The formula is so comfortable to wear and doesn't crease.", rating: 5 },
    { title: "My go-to product", comment: "I reach for this every single day. The quality is consistently excellent and it makes my whole makeup look so polished.", rating: 5 },
    { title: "Worth the investment", comment: "Compared to cheaper alternatives this is night and day. The quality justifies the price and it lasts much longer too.", rating: 5 },
    { title: "Beautiful result", comment: "Applied easily and looked gorgeous all day. No patchiness, no fading. This is how makeup should be made.", rating: 5 },
    { title: "Good quality", comment: "Solid product with great pigmentation. Comfortable to wear and looks great. Would recommend to any makeup lover.", rating: 4 },
];

window.addEventListener('load', testConnection);

async function testConnection() {
    const statusDiv = document.getElementById('status');
    const dot = document.getElementById('dot');
    const statusText = document.getElementById('statusText');
    statusDiv.className = 'status';
    dot.className = 'dot';
    statusText.textContent = 'Checking backend connection...';
    try {
        const res = await fetch(`${API_BASE_URL}/Products`);
        if (res.ok) {
            const data = await res.json();
            statusDiv.className = 'status connected';
            dot.className = 'dot connected';
            statusText.textContent = `✅ Connected! ${data.length} products found in database.`;
            return data;
        } else throw new Error('Error');
    } catch {
        statusDiv.className = 'status error';
        dot.className = 'dot error';
        statusText.textContent = '❌ Cannot connect to Railway backend.';
        return null;
    }
}

function generateReview(product, index) {
    const isSkincare = product.category === 'Skincare';
    const pool = isSkincare ? SKINCARE_REVIEWS : MAKEUP_REVIEWS;
    const review = pool[(index + product.productId) % pool.length];
    const userId = FAKE_USER_IDS[(index + product.productId) % FAKE_USER_IDS.length];
    const daysAgo = Math.floor(Math.random() * 180) + 1;
    const reviewDate = new Date();
    reviewDate.setDate(reviewDate.getDate() - daysAgo);

    return {
        productId: product.productId,
        userId: userId,
        rating: review.rating,
        title: review.title,
        comment: review.comment,
        reviewDate: reviewDate.toISOString(),
        isVerifiedPurchase: Math.random() > 0.2,
        helpfulCount: Math.floor(Math.random() * 25)
    };
}

async function startSeeding() {
    if (isRunning) return;

    const products = await testConnection();
    if (!products || products.length === 0) {
        alert('Cannot connect to backend or no products found!');
        return;
    }

    isRunning = true;
    document.getElementById('seedBtn').disabled = true;
    document.getElementById('seedBtn').textContent = '⏳ Seeding...';
    document.getElementById('progressContainer').classList.add('active');
    document.getElementById('completion').classList.remove('show');
    document.getElementById('log').innerHTML = '';

    const reviewsPerProduct = [3, 3, 4, 4, 5];
    let allReviews = [];

    for (const product of products) {
        const count = reviewsPerProduct[product.productId % reviewsPerProduct.length];
        for (let i = 0; i < count; i++) {
            allReviews.push(generateReview(product, i));
        }
    }

    const total = allReviews.length;
    let success = 0;
    let failed = 0;

    document.getElementById('totalCount').textContent = total;

    log('info', `🚀 Starting to seed ${total} reviews for ${products.length} products...`);
    log('info', '─'.repeat(60));

    for (let i = 0; i < allReviews.length; i++) {
        const review = allReviews[i];
        document.getElementById('currentCount').textContent = i + 1;

        try {
            const res = await fetch(`${API_BASE_URL}/Reviews/Seed`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(review)
            });

            if (res.ok) {
                success++;
                document.getElementById('successCount').textContent = success;
                if (i % 10 === 0) log('success', `✅ [${i+1}/${total}] Uploaded reviews up to product ${review.productId}`);
            } else {
                failed++;
                document.getElementById('failedCount').textContent = failed;
                const err = await res.text();
                log('error', `❌ [${i+1}/${total}] Failed: ${err.substring(0, 80)}`);
            }
        } catch (e) {
            failed++;
            document.getElementById('failedCount').textContent = failed;
            log('error', `❌ [${i+1}/${total}] Error: ${e.message}`);
        }

        const pct = Math.round(((i+1) / total) * 100);
        document.getElementById('bar').style.width = pct + '%';
        document.getElementById('bar').textContent = pct + '%';

        await sleep(80);
    }

    isRunning = false;
    document.getElementById('seedBtn').disabled = false;
    document.getElementById('seedBtn').textContent = '🚀 Seed All Reviews';

    log('info', '─'.repeat(60));
    log('success', `🎉 Done! ${success} reviews uploaded, ${failed} failed.`);

    const comp = document.getElementById('completion');
    document.getElementById('completionText').textContent = `${success} reviews uploaded across ${products.length} products! Go check the live site.`;
    comp.classList.add('show');
}

function log(type, msg) {
    const logEl = document.getElementById('log');
    const entry = document.createElement('div');
    entry.className = `log-entry ${type}`;
    entry.textContent = msg;
    logEl.appendChild(entry);
    logEl.scrollTop = logEl.scrollHeight;
}

function clearLog() {
    document.getElementById('log').innerHTML = '';
    document.getElementById('progressContainer').classList.remove('active');
    document.getElementById('completion').classList.remove('show');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
</body>
</html>
